<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stellarity 攻略ガイド 完全版（画像復元）</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
:root{--bg:#0d0d1a;--card:#161628;--card2:#1e1e38;--accent:#a78bfa;--accent2:#818cf8;--gold:#fbbf24;--green:#34d399;--red:#f87171;--blue:#60a5fa;--text:#e2e8f0;--muted:#94a3b8;--border:#2d2d5a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;line-height:1.7;font-size:14px;}
header{background:linear-gradient(135deg,#0d0d1a 0%,#1a1040 50%,#0d0d1a 100%);border-bottom:2px solid var(--accent);padding:36px 20px 24px;text-align:center;}
header h1{font-size:2.2em;font-weight:900;background:linear-gradient(90deg,var(--accent),var(--blue),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
header p{color:var(--muted);margin-top:6px;font-size:.9em;}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:5px;flex-wrap:wrap;justify-content:center;position:sticky;top:0;z-index:100;}
.nb{background:transparent;color:var(--accent);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.8em;cursor:pointer;font-family:inherit;transition:all .2s;}
.nb.on,.nb:hover{background:var(--accent);color:#0d0d1a;}
.wrap{max-width:960px;margin:0 auto;padding:26px 16px;}
.sec{display:none;}
.sec.on{display:block;}
.st{font-size:1.5em;font-weight:900;padding:10px 18px;border-radius:10px;background:linear-gradient(90deg,var(--card2),transparent);border-left:4px solid var(--accent);display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:14px;}
.ct{font-weight:700;font-size:1.05em;color:var(--accent);margin-bottom:8px;}
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px;}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.mu{color:var(--muted);font-size:.87em;}
.ir{display:flex;gap:14px;align-items:flex-start;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.ii{width:64px;height:64px;object-fit:contain;image-rendering:pixelated;border-radius:6px;background:var(--card2);border:1px solid var(--border);flex-shrink:0;}
.ip{width:64px;height:64px;border-radius:6px;background:var(--card2);border:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--border);font-size:1.2em;}
.inf{flex:1;}
.in{font-weight:900;font-size:1em;}
.ik{font-size:.76em;color:var(--muted);margin-bottom:5px;}
.id{font-size:.84em;color:var(--muted);line-height:1.6;}
.ab{background:rgba(167,139,250,.07);border-radius:6px;padding:6px 10px;margin-top:6px;font-size:.83em;color:var(--muted);}
.ab strong{color:var(--accent2);}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.72em;font-weight:700;margin:2px;}
.bp{background:rgba(167,139,250,.2);color:var(--accent);border:1px solid rgba(167,139,250,.4);}
.bg{background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.4);}
.br{background:rgba(248,113,113,.2);color:var(--red);border:1px solid rgba(248,113,113,.4);}
.bb{background:rgba(96,165,250,.2);color:var(--blue);border:1px solid rgba(96,165,250,.4);}
.bo{background:rgba(251,191,36,.2);color:var(--gold);border:1px solid rgba(251,191,36,.4);}
.tip{background:rgba(167,139,250,.1);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:.85em;}
.tip strong{color:var(--accent);}
.wb{background:rgba(251,191,36,.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 14px;margin:10px 0;font-size:.85em;}
.wb strong{color:var(--gold);}
.ac{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.ah{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.abody{padding:14px 18px;}
.as{font-size:.84em;color:var(--muted);margin-bottom:4px;}
.bonb{background:rgba(167,139,250,.1);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:10px;font-size:.84em;}
.crb{background:rgba(251,191,36,.08);border-left:3px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 14px;margin-top:8px;font-size:.83em;color:var(--muted);}
.bc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;}
.ic{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.ic img{width:100%;height:140px;object-fit:cover;display:block;}
.il{padding:8px 12px;font-size:.85em;font-weight:700;color:var(--accent);}
.id2{padding:0 12px 10px;font-size:.8em;color:var(--muted);}
.bh{background:linear-gradient(135deg,var(--card2),#2d1b4e);padding:18px;display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start;}
.bh img{width:220px;height:130px;object-fit:cover;border-radius:8px;flex-shrink:0;}
table{width:100%;border-collapse:collapse;font-size:.85em;}
th{background:var(--card2);color:var(--accent);padding:8px 12px;text-align:left;font-size:.82em;}
td{padding:8px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
tr:last-child td{border-bottom:none;}
.subt{font-size:.82em;font-weight:700;color:var(--accent2);margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.cl{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8em;font-weight:700;margin-bottom:10px;}
.ci{border-bottom:1px solid var(--border);padding:8px 0;display:flex;gap:8px;font-size:.88em;}
.ci::before{content:"◆";color:var(--accent);flex-shrink:0;}
footer{text-align:center;padding:28px;color:var(--muted);font-size:.82em;border-top:1px solid var(--border);}
footer a{color:var(--accent);text-decoration:none;}
@media(max-width:600px){header h1{font-size:1.7em;}.bh img{width:100%;}}
</style>
</head>
<body>
<header>
  <h1>🌌 Stellarity 攻略ガイド 完全版</h1>

function img(key, sz) {
  sz = sz || "64px";
  var src = IMGS[key];
  if (!src) return '<div class="ip" style="width:'+sz+';height:'+sz+';">?</div>';
  return '<img src="'+src+'" class="ii" style="width:'+sz+';height:'+sz+';image-rendering:pixelated;" onerror="this.style.opacity=0" alt="">';
}
function icard(src, lbl, desc) {
  return '<div class="ic"><img src="'+src+'" onerror="this.style.display=\'none\'" alt="'+lbl+'"><div class="il">'+lbl+'</div><div class="id2">'+desc+'</div></div>';
}
function b(c, t) { return '<span class="badge '+c+'">'+t+'</span>'; }
function tip(t) { return '<div class="tip">'+t+'</div>'; }
function wb(t) { return '<div class="wb">'+t+'</div>'; }
function stars(n) { return "★".repeat(n)+"☆".repeat(5-n); }
function row(key, name, kana, desc, tags, ability) {
  tags = tags || ""; ability = ability || "";
  return '<div class="ir">'+img(key)+'<div class="inf"><div class="in">'+name+'</div><div class="ik">'+kana+'</div><div class="id">'+desc+'</div>'+(ability?'<div class="ab"><strong>✨ アビリティ：</strong>'+ability+'</div>':'')+'<div style="margin-top:6px;">'+tags+'</div></div></div>';
}

// ── セクション定義 ──────────────────────────────
function secOverview() {
  return '<div class="st"><span>📖</span> Stellarityとは</div>'
  +'<div class="card"><p style="margin-bottom:12px;">StellarityはMinecraftのThe Endを根本から作り直すデータパックです。ライトとダークの魔法・幻想をテーマに、全く新しい地形・バイオーム・アイテム・ボスが追加されます。</p>'+b("bp","23種 バイオーム")+b("bo","40種以上 アイテム")+b("br","強化ボス2体")+b("bg","新メカニクス多数")+b("bb","Minecraft 1.21対応")+'</div>'
  +'<div class="g3">'+icard(MR.biomes1,"多彩なバイオーム","23種類の新バイオームが生成")+icard(MR.strong,"巨大Stronghold","バニラの約7倍の規模")+icard(MR.mechs,"独自メカニクス","Void Fishing、Cauldron Craftingなど")+'</div>';
}

function secBeginner() {
  var checks = [["装備","フルNetherite推奨。Protection IVとFeather Falling IVは必須級"],["食料","十分な量を持参。The EndからOverworldへの帰還は困難"],["弓 & 矢","Infinity enchant または大量の矢（Crystal破壊に必須）"],["炎耐性ポーション","Evoker対策。Empress of Light戦でも有効"],["松明・マーカー","Strongholdは巨大で迷いやすい"]];

  +'<div class="g2"><div class="card"><div class="ct">🏰 Stronghold攻略ポイント</div><p class="mu">バニラの約7倍の規模。VindicatorやEvokerが大量出現。Portal Roomは毎回異なる構造。</p>'+tip('<strong>💡</strong> 内部にSculk Labなどの隠し部屋が存在します。')+'</div>'

}

];

var main = document.getElementById("main");

TABS.forEach(function(tab, i) {
  var btn = document.createElement("button");
  btn.className = "nb" + (i===0 ? " on" : "");
  btn.textContent = tab.label;
  btn.onclick = function() {
    document.querySelectorAll(".nb").forEach(function(b){ b.classList.remove("on"); });
    document.querySelectorAll(".sec").forEach(function(s){ s.classList.remove("on"); });
    btn.classList.add("on");
    document.getElementById("s"+i).classList.add("on");
  };
  nav.appendChild(btn);

  var sec = document.createElement("div");
  sec.className = "sec" + (i===0 ? " on" : "");
  sec.id = "s"+i;
  sec.innerHTML = tab.fn();
  main.appendChild(sec);
});
